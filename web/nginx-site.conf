# Nginx configuration for SNMP Monitor Web Frontend
# Deploy:
#   sudo cp web/nginx-site.conf /etc/nginx/sites-available/snmp-monitor
#   sudo ln -sf /etc/nginx/sites-available/snmp-monitor /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    root /home/mx/NetProgramming/CourseDesign/web/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }
}
