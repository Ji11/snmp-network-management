# SNMP Agent configuration for VM (snmpd on Ubuntu)
# Deploy: sudo cp aux/snmpd.conf /etc/snmp/snmpd.conf && sudo systemctl restart snmpd

rocommunity bjfu11mx
syslocation "Ubuntu VM"
syscontact admin@example.edu.cn

# Monitor / partition disk usage (populates dskTable)
disk /

# named process CPU time and memory via exec scripts
# extResult.1 = named CPU time, extResult.2 = named RSS
exec named-cpu /usr/local/bin/named_cpu.sh
exec named-mem /usr/local/bin/named_mem.sh
